name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Init Capacitor
        run: |
          npx cap init "Beslenme Takip" "com.koray.beslenme" --web-dir .
          npx cap add android

      - name: Copy web assets
        run: npx cap copy android

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/beslenme.keystore

      - name: Add logo
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          cp logo.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp logo.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          cp logo.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp logo.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp logo.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp logo.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp logo.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp logo.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp logo.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp logo.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/beslenme.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEYSTORE_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: beslenme-takip-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
